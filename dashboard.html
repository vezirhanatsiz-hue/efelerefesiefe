<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ana Sayfa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>İsim ve Kod Yönetimi</h1>
        <form id="addForm">
            <input type="text" id="name" placeholder="İsim" required>
            <input type="text" id="code" placeholder="Kod" required>
            <button type="submit">Ekle</button>
        </form>
        <h2>Arama</h2>
        <input type="text" id="searchName" placeholder="İsim ara">
        <button id="searchBtn">Ara</button>
        <p id="result"></p>
        <button id="logoutBtn">Çıkış</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
