<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veri Sistemi</title>

<style>
body {
    background: linear-gradient(135deg, #1f1f2e, #2d2d50);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    color: white;
}

.box {
    background: #2f2f46;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 10px;
    background: #00c896;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

.result {
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
    <h2>VERİ SİSTEMİ</h2>

    <input id="name" placeholder="İsim">
    <input id="code" placeholder="Kod">
    <button onclick="add()">Ekle</button>

    <input id="search" placeholder="Ara">
    <button onclick="search()">Ara</button>

    <div id="result" class="result"></div>
</div>

<script>
async function add() {
    const name = document.getElementById("name").value;
    const code = document.getElementById("code").value;

    const res = await fetch("/api/add", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ name, code })
    });

    const data = await res.json();
    alert(data.message || data.error);
}

async function search() {
    const name = document.getElementById("search").value;

    const res = await fetch("/api/search", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ name })
    });

    const data = await res.json();

    document.getElementById("result").innerText =
        data.code ? "Kod: " + data.code : data.error;
}
</script>

</body>
</html>
